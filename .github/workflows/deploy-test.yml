name: Deploy to Test
on:
  push:
    branches: [test]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: .
          containerAppName: fydron-test-api
          resourceGroup: fydron-rg