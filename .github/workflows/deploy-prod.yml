name: Deploy to Production
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: .
          containerAppName: fydron-prod-api
          resourceGroup: fydron-rg